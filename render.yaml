services:
  - type: web
    name: llm-arena-grok
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_PATH
        value: /data/llm_arena.db
    plan: free
    healthCheckPath: /
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
